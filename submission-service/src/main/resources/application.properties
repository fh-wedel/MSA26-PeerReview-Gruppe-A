spring.application.name=submission
spring.main.banner-mode=off
management.endpoint.health.probes.enabled=true
server.port=${SERVER_PORT:8080}

# AWS SQS Configuration
spring.cloud.aws.sqs.dualstack-enabled=true
aws.sqs.request.queue-name=${SQS_REQUEST_QUEUE:}
aws.sqs.response.queue-name=${SQS_RESPONSE_QUEUE:}
spring.cloud.aws.region.static=${AWS_REGION}
aws.s3.bucket-name=${S3_BUCKET_NAME:peerreview-submissions-bucket}

# Database Connectivity Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:submission_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.flyway.baseline-on-migrate=true
