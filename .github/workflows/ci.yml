name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: read
  id-token: write
  pull-requests: write # Needed to read PR data for ChatOps

concurrency:
  group: ci-${{ github.ref }}-${{ github.event.comment.id || 'no-comment' }}
  cancel-in-progress: false

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is_deploy_command: ${{ steps.check.outputs.triggered }}
      pr_branch: ${{ steps.get-branch.outputs.branch }}
    steps:
      - id: check
        if: github.event.issue.pull_request && contains(github.event.comment.body, '/deploy')
        run: echo "triggered=true" >> $GITHUB_OUTPUT

      - id: get-branch
        if: steps.check.outputs.triggered == 'true'
        run: |
          BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changes:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' || 
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/deploy'))
    outputs:
      baseline: ${{ steps.filter.outputs.baseline }}
      infra_library: ${{ steps.filter.outputs.infra_library }}
      template_service_code: ${{ steps.filter.outputs.template_service_code }}
      template_service_infra: ${{ steps.filter.outputs.template_service_infra }}
      template_service_any: ${{ steps.filter.outputs.template_service_any }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.issue.pull_request && steps.get-branch.outputs.branch || github.ref }}
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            baseline:
              - 'infrabaseline/**'
            infra_library:
              - 'infraLibrary/**'
            template_service_code:
              - 'templateEcsService/src/**'
              - 'templateEcsService/pom.xml'
              - 'templateEcsService/Dockerfile'
            template_service_infra:
              - 'templateEcsService/infra/**'
            template_service_any:
              - 'templateEcsService/**'
              - 'infraLibrary/**'

  infra-library-tests:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infra_library == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.issue.pull_request && needs.check-trigger.outputs.pr_branch || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infraLibrary/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Run tests
        run: npm run test
        working-directory: infraLibrary

  baseline-build:
    runs-on: ubuntu-latest
    needs: [changes, check-trigger]
    if: needs.changes.outputs.baseline == 'true' || needs.check-trigger.outputs.is_deploy_command == 'true' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.issue.pull_request && needs.check-trigger.outputs.pr_branch || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrabaseline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infrabaseline
      - name: Run tests
        run: npm run test
        working-directory: infrabaseline
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK diff
        run: npx cdk diff --all
        working-directory: infrabaseline

  baseline-deploy:
    runs-on: ubuntu-latest
    needs: [check-trigger, baseline-build]
    if: |
      always() && needs.baseline-build.result == 'success' && (
        github.ref == 'refs/heads/main' || 
        github.event_name == 'workflow_dispatch' || 
        needs.check-trigger.outputs.is_deploy_command == 'true'
      )
    environment: "fh-wedel-prod"
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.issue.pull_request && needs.check-trigger.outputs.pr_branch || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrabaseline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infrabaseline
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never
        working-directory: infrabaseline

  template-service:
    needs: [check-trigger, changes, infra-library-tests]
    if: |
      always() && 
      needs.changes.outputs.template_service_any == 'true' && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: template
      service_path: templateEcsService
      infra_path: templateEcsService/infra
      docker_context: templateEcsService
      ecr_repository: fh-wedel/template
      run_maven: ${{ needs.changes.outputs.template_service_code == 'true' || needs.check-trigger.outputs.is_deploy_command == 'true' || github.event_name == 'workflow_dispatch' }}
      run_infra: ${{ needs.changes.outputs.template_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || needs.check-trigger.outputs.is_deploy_command == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.template_service_code == 'true' || needs.check-trigger.outputs.is_deploy_command == 'true' || github.event_name == 'workflow_dispatch' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || needs.check-trigger.outputs.is_deploy_command == 'true' }}
      deploy_environment: "fh-wedel-prod"
      ref: ${{ github.event.issue.pull_request && needs.check-trigger.outputs.pr_branch || github.ref }}
    secrets: inherit
