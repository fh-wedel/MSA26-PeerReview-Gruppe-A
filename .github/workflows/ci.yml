name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      baseline: ${{ steps.filter.outputs.baseline }}
      infra_library: ${{ steps.filter.outputs.infra_library }}
      template_service_code: ${{ steps.filter.outputs.template_service_code }}
              - 'api-client/**'
      template_service_infra: ${{ steps.filter.outputs.template_service_infra }}
      template_service_any: ${{ steps.filter.outputs.template_service_any }}
              - 'api-client/**'
      user_service_code: ${{ steps.filter.outputs.user_service_code }}
              - 'api-client/**'
      user_service_infra: ${{ steps.filter.outputs.user_service_infra }}
      user_service_any: ${{ steps.filter.outputs.user_service_any }}
              - 'api-client/**'
      web_ui_code: ${{ steps.filter.outputs.web_ui_code }}
              - 'api-client/**'
      web_ui_infra: ${{ steps.filter.outputs.web_ui_infra }}
      web_ui_any: ${{ steps.filter.outputs.web_ui_any }}
              - 'api-client/**'
      matching_service_code: ${{ steps.filter.outputs.matching_service_code }}
              - 'api-client/**'
      matching_service_infra: ${{ steps.filter.outputs.matching_service_infra }}
      matching_service_any: ${{ steps.filter.outputs.matching_service_any }}
              - 'api-client/**'
      communication_service_code: ${{ steps.filter.outputs.communication_service_code }}
              - 'api-client/**'
      communication_service_infra: ${{ steps.filter.outputs.communication_service_infra }}
      communication_service_any: ${{ steps.filter.outputs.communication_service_any }}
              - 'api-client/**'
      configuration_service_code: ${{ steps.filter.outputs.configuration_service_code }}
              - 'api-client/**'
      configuration_service_infra: ${{ steps.filter.outputs.configuration_service_infra }}
      configuration_service_any: ${{ steps.filter.outputs.configuration_service_any }}
              - 'api-client/**'
      submission_service_code: ${{ steps.filter.outputs.submission_service_code }}
              - 'api-client/**'
      submission_service_infra: ${{ steps.filter.outputs.submission_service_infra }}
      submission_service_any: ${{ steps.filter.outputs.submission_service_any }}
              - 'api-client/**'
      notification_service_code: ${{ steps.filter.outputs.notification_service_code }}
              - 'api-client/**'
      notification_service_infra: ${{ steps.filter.outputs.notification_service_infra }}
      notification_service_any: ${{ steps.filter.outputs.notification_service_any }}
              - 'api-client/**'
      response_service_code: ${{ steps.filter.outputs.response_service_code }}
              - 'api-client/**'
      response_service_infra: ${{ steps.filter.outputs.response_service_infra }}
      response_service_any: ${{ steps.filter.outputs.response_service_any }}
              - 'api-client/**'
      cloudfront: ${{ steps.filter.outputs.cloudfront }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            baseline:
              - 'infrabaseline/**'
            infra_library:
              - 'infraLibrary/**'
            template_service_code:
              - 'api-client/**'
              - 'templateEcsService/src/**'
              - 'templateEcsService/pom.xml'
              - 'templateEcsService/Dockerfile'
            template_service_infra:
              - 'templateEcsService/infra/**'
            template_service_any:
              - 'api-client/**'
              - 'templateEcsService/**'
              - 'infraLibrary/**'
            user_service_code:
              - 'api-client/**'
              - 'userService/src/**'
              - 'userService/pom.xml'
              - 'userService/Dockerfile'
            user_service_infra:
              - 'userService/infra/**'
            user_service_any:
              - 'api-client/**'
              - 'userService/**'
              - 'infraLibrary/**'
              - 'workflow-service/workflow-*/**'
              - 'workflow-service/pom.xml'
              - 'workflow-service/Dockerfile'
              - 'workflow-service/infra/**'
              - 'workflow-service/**'
              - 'infraLibrary/**'
            web_ui_code:
              - 'api-client/**'
              - 'web-ui/src/**'
              - 'web-ui/public/**'
              - 'web-ui/index.html'
              - 'web-ui/vite.config.ts'
              - 'web-ui/package*.json'
              - 'web-ui/Dockerfile'
              - 'web-ui/nginx.conf'
            web_ui_infra:
              - 'web-ui/infra/**'
            web_ui_any:
              - 'api-client/**'
              - 'web-ui/**'
              - 'infraLibrary/**'
            matching_service_code:
              - 'api-client/**'
              - 'matchingService/src/**'
              - 'matchingService/pom.xml'
              - 'matchingService/Dockerfile'
            matching_service_infra:
              - 'matchingService/infra/**'
            matching_service_any:
              - 'api-client/**'
              - 'matchingService/**'
              - 'infraLibrary/**'
            communication_service_code:
              - 'api-client/**'
              - 'communicationService/src/**'
              - 'communicationService/pom.xml'
              - 'communicationService/Dockerfile'
            communication_service_infra:
              - 'communicationService/infra/**'
            communication_service_any:
              - 'api-client/**'
              - 'communicationService/**'
            configuration_service_code:
              - 'api-client/**'
              - 'configuration-service/src/**'
              - 'configuration-service/pom.xml'
              - 'configuration-service/Dockerfile'
            configuration_service_infra:
              - 'configuration-service/infra/**'
            configuration_service_any:
              - 'api-client/**'
              - 'configuration-service/**'
              - 'infraLibrary/**'
            submission_service_code:
              - 'api-client/**'
              - 'submission-service/src/**'
              - 'submission-service/pom.xml'
              - 'submission-service/Dockerfile'
            submission_service_infra:
              - 'submission-service/infra/**'
            submission_service_any:
              - 'api-client/**'
              - 'submission-service/**'
              - 'infraLibrary/**'
            notification_service_code:
              - 'api-client/**'
              - 'notificationService/src/**'
              - 'notificationService/pom.xml'
              - 'notificationService/Dockerfile'
            notification_service_infra:
              - 'notificationService/infra/**'
            notification_service_any:
              - 'api-client/**'
              - 'notificationService/**'
              - 'infraLibrary/**'
            response_service_code:
              - 'api-client/**'
              - 'responseService/src/**'
              - 'responseService/pom.xml'
              - 'responseService/Dockerfile'
            response_service_infra:
              - 'responseService/infra/**'
            response_service_any:
              - 'api-client/**'
              - 'responseService/**'
              - 'infraLibrary/**'
            cloudfront:
              - 'cloudfront/**'
              - 'infraLibrary/**'

  infra-library-tests:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infra_library == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infraLibrary/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Run tests
        run: npm run test -- --runInBand --workerIdleMemoryLimit=512MB
        working-directory: infraLibrary

  baseline-build:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.baseline == 'true' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrabaseline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infrabaseline
      - name: Install infraLibrary dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Install esbuild globally
        run: npm install -g esbuild
      - name: Run tests
        run: npm run test -- --runInBand --workerIdleMemoryLimit=512MB
        working-directory: infrabaseline
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK diff
        run: npx cdk diff --all
        working-directory: infrabaseline

  baseline-deploy:
    runs-on: ubuntu-latest
    needs: [baseline-build]
    if: |
      always() && needs.baseline-build.result == 'success' && (
        github.ref == 'refs/heads/main' || 
        github.event_name == 'workflow_dispatch'
      )
    environment: "fh-wedel-prod"
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrabaseline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infrabaseline
      - name: Install infraLibrary dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Install esbuild globally
        run: npm install -g esbuild
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never
        working-directory: infrabaseline

  template-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.template_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: template
      service_path: templateEcsService
      infra_path: templateEcsService/infra
      docker_context: .
      ecr_repository: fh-wedel/template
      run_maven: ${{ needs.changes.outputs.template_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.template_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.template_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  user-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.user_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: user
      service_path: userService
      infra_path: userService/infra
      docker_context: .
      ecr_repository: fh-wedel/user
      run_maven: ${{ needs.changes.outputs.user_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.user_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.user_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  web-ui:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.web_ui_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: web-ui
      service_path: web-ui
      infra_path: web-ui/infra
      docker_context: web-ui
      ecr_repository: fh-wedel/web-ui
      run_maven: false
      run_frontend_test: ${{ needs.changes.outputs.web_ui_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_infra: ${{ needs.changes.outputs.web_ui_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.web_ui_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  matching-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.matching_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: matching
      service_path: matchingService
      infra_path: matchingService/infra
      docker_context: .
      ecr_repository: fh-wedel/matching
      run_maven: ${{ needs.changes.outputs.matching_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.matching_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.matching_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  communication-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.communication_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: communication
      service_path: communicationService
      infra_path: communicationService/infra
      docker_context: .
      ecr_repository: fh-wedel/communication
      run_maven: ${{ needs.changes.outputs.communication_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.communication_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.communication_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  configuration-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.configuration_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: configuration
      service_path: configuration-service
      infra_path: configuration-service/infra
      docker_context: .
      ecr_repository: fh-wedel/configuration
      run_maven: ${{ needs.changes.outputs.configuration_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.configuration_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.configuration_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  submission-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.submission_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: submission
      service_path: submission-service
      infra_path: submission-service/infra
      docker_context: .
      ecr_repository: fh-wedel/submission
      run_maven: ${{ needs.changes.outputs.submission_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.submission_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.submission_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  notification-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.notification_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: notification
      service_path: notificationService
      infra_path: notificationService/infra
      docker_context: .
      ecr_repository: fh-wedel/notification
      run_maven: ${{ needs.changes.outputs.notification_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.notification_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.notification_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  response-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.response_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: response
      service_path: responseService
      infra_path: responseService/infra
      docker_context: .
      ecr_repository: fh-wedel/response
      run_maven: ${{ needs.changes.outputs.response_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_frontend_test: false
      run_infra: ${{ needs.changes.outputs.response_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.response_service_code == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  # ── CloudFront distribution ─────────────────────────────────────────────────
  # Pure CDK deploy — no Docker image, no Maven. Runs after web-ui because it
  # imports the Web UI API Gateway domain name from CloudFormation exports.
  # Triggers when cloudfront/ or infraLibrary/ changes, when the web-ui job ran,
  # or on workflow_dispatch.
  cloudfront-deploy:
    runs-on: ubuntu-latest
    needs: [ changes, web-ui, template-service, user-service, matching-service, communication-service, configuration-service, submission-service, notification-service, response-service ]
    if: |
      always() && 
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && 
      (needs.changes.outputs.cloudfront == 'true' || needs.changes.outputs.web_ui_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['web-ui'].result == 'success' || needs['web-ui'].result == 'skipped') && 
      (needs['template-service'].result == 'success' || needs['template-service'].result == 'skipped') && 
      (needs['matching-service'].result == 'success' || needs['matching-service'].result == 'skipped') && 
      (needs['communication-service'].result == 'success' || needs['communication-service'].result == 'skipped') && 
      (needs['configuration-service'].result == 'success' || needs['configuration-service'].result == 'skipped') && 
      (needs['submission-service'].result == 'success' || needs['submission-service'].result == 'skipped') && 
      (needs['response-service'].result == 'success' || needs['response-service'].result == 'skipped') && 
      (needs['notification-service'].result == 'success' || needs['notification-service'].result == 'skipped') && 
      (needs['user-service'].result == 'success' || needs['user-service'].result == 'skipped')
    environment: "fh-wedel-prod"
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudfront/package-lock.json

      - name: Install cloudfront dependencies
        run: npm ci
        working-directory: cloudfront

      - name: Install infraLibrary dependencies
        run: npm ci
        working-directory: infraLibrary

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK diff
        run: npx cdk diff
        working-directory: cloudfront

      - name: CDK deploy
        run: npx cdk deploy --require-approval never
        working-directory: cloudfront
