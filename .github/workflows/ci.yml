name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      baseline: ${{ steps.filter.outputs.baseline }}
      infra_library: ${{ steps.filter.outputs.infra_library }}
      template_service_code: ${{ steps.filter.outputs.template_service_code }}
      template_service_infra: ${{ steps.filter.outputs.template_service_infra }}
      template_service_any: ${{ steps.filter.outputs.template_service_any }}
      web_ui_code: ${{ steps.filter.outputs.web_ui_code }}
      web_ui_infra: ${{ steps.filter.outputs.web_ui_infra }}
      web_ui_any: ${{ steps.filter.outputs.web_ui_any }}
      cloudfront: ${{ steps.filter.outputs.cloudfront }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            baseline:
              - 'infrabaseline/**'
            infra_library:
              - 'infraLibrary/**'
            template_service_code:
              - 'templateEcsService/src/**'
              - 'templateEcsService/pom.xml'
              - 'templateEcsService/Dockerfile'
            template_service_infra:
              - 'templateEcsService/infra/**'
            template_service_any:
              - 'templateEcsService/**'
              - 'infraLibrary/**'
            web_ui_code:
              - 'web-ui/src/**'
              - 'web-ui/public/**'
              - 'web-ui/index.html'
              - 'web-ui/vite.config.ts'
              - 'web-ui/package*.json'
              - 'web-ui/Dockerfile'
              - 'web-ui/nginx.conf'
            web_ui_infra:
              - 'web-ui/infra/**'
            web_ui_any:
              - 'web-ui/**'
              - 'infraLibrary/**'
            cloudfront:
              - 'cloudfront/**'
              - 'infraLibrary/**'

  infra-library-tests:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infra_library == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infraLibrary/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Run tests
        run: npm run test -- --runInBand --workerIdleMemoryLimit=512MB
        working-directory: infraLibrary

  baseline-build:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.baseline == 'true' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrabaseline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infrabaseline
      - name: Install infraLibrary dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Install esbuild globally
        run: npm install -g esbuild
      - name: Run tests
        run: npm run test -- --runInBand --workerIdleMemoryLimit=512MB
        working-directory: infrabaseline
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK diff
        run: npx cdk diff --all
        working-directory: infrabaseline

  baseline-deploy:
    runs-on: ubuntu-latest
    needs: [baseline-build]
    if: |
      always() && needs.baseline-build.result == 'success' && (
        github.ref == 'refs/heads/main' || 
        github.event_name == 'workflow_dispatch'
      )
    environment: "fh-wedel-prod"
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: infrabaseline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: infrabaseline
      - name: Install infraLibrary dependencies
        run: npm ci
        working-directory: infraLibrary
      - name: Install esbuild globally
        run: npm install -g esbuild
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never
        working-directory: infrabaseline

  template-service:
    needs: [changes, infra-library-tests]
    if: |
      always() && 
      (needs.changes.outputs.template_service_any == 'true' || github.event_name == 'workflow_dispatch') && 
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: template
      service_path: templateEcsService
      infra_path: templateEcsService/infra
      docker_context: templateEcsService
      ecr_repository: fh-wedel/template
      run_maven: ${{ needs.changes.outputs.template_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      run_infra: ${{ needs.changes.outputs.template_service_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.template_service_code == 'true' || github.event_name == 'workflow_dispatch' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  web-ui:
    needs: [changes, infra-library-tests]
    if: |
      always() &&
      (needs.changes.outputs.web_ui_any == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs['infra-library-tests'].result == 'success' || needs['infra-library-tests'].result == 'skipped')
    uses: ./.github/workflows/reusable-service.yml
    with:
      service_name: web-ui
      service_path: web-ui
      infra_path: web-ui/infra
      docker_context: web-ui
      ecr_repository: fh-wedel/web-ui
      run_maven: false
      run_infra: ${{ needs.changes.outputs.web_ui_infra == 'true' || needs.changes.outputs.infra_library == 'true' || github.event_name == 'workflow_dispatch' }}
      run_docker: ${{ needs.changes.outputs.web_ui_code == 'true' || github.event_name == 'workflow_dispatch' }}
      allow_deploy: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
      deploy_environment: "fh-wedel-prod"
    secrets: inherit

  # ── CloudFront distribution ─────────────────────────────────────────────────
  # Pure CDK deploy — no Docker image, no Maven. Runs after web-ui because it
  # imports the Web UI API Gateway domain name from CloudFormation exports.
  # Triggers when cloudfront/ or infraLibrary/ changes, when the web-ui job ran,
  # or on workflow_dispatch.
  cloudfront-deploy:
    runs-on: ubuntu-latest
    needs: [changes, web-ui, template-service]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.cloudfront == 'true' || needs.changes.outputs.web_ui_any == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs['web-ui'].result == 'success' || needs['web-ui'].result == 'skipped') &&
      (needs['template-service'].result == 'success' || needs['template-service'].result == 'skipped')
    environment: "fh-wedel-prod"
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cloudfront/package-lock.json

      - name: Install cloudfront dependencies
        run: npm ci
        working-directory: cloudfront

      - name: Install infraLibrary dependencies
        run: npm ci
        working-directory: infraLibrary

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK diff
        run: npx cdk diff
        working-directory: cloudfront

      - name: CDK deploy
        run: npx cdk deploy --require-approval never
        working-directory: cloudfront
