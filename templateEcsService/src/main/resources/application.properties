spring.application.name=template
spring.main.banner-mode=off
management.endpoint.health.probes.enabled=true
server.port=${SERVER_PORT:8080}

# AWS SQS Configuration
spring.cloud.aws.sqs.dualstack-enabled=true
aws.sqs.request.queue-name=${SQS_REQUEST_QUEUE:}
aws.sqs.response.queue-name=${SQS_RESPONSE_QUEUE:}
spring.cloud.aws.region.static=${AWS_REGION}
