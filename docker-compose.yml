services:
  template-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/template:latest
    build:
      context: templateEcsService
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    volumes:
      - /Users/matthias/.aws:/home/spring/.aws:ro
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-fh-wedel-msa}
      - SPRING_CLOUD_AWS_REGION_STATIC=eu-north-1

  web-ui-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/web-ui:latest
    build:
      context: web-ui
      target: dev
    user: root
    ports:
      - "5173:5173"
    volumes:
      - ./web-ui:/app
      - web_ui_node_modules:/app/node_modules
    command: sh -c "cd /app && npm install && npx vite --host"

  workflow-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/workflow:latest
    build:
      context: workflow-service
    ports:
      - "8081:8080"

  configuration-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/configuration:latest
    build:
      context: configuration-service
    ports:
      - "8082:8080"
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - /Users/matthias/.aws:/home/spring/.aws:ro
    entrypoint: ["java", "-Djava.net.preferIPv6Addresses=false", "-Djava.net.preferIPv4Stack=true", "-jar", "app.jar"]
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-fh-wedel-msa}
      - SPRING_CLOUD_AWS_REGION_STATIC=eu-north-1

volumes:
  web_ui_node_modules:
