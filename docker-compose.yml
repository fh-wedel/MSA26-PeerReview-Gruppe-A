services:
  template-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/template:latest
    build:
      context: templateEcsService
    # Run the container as the host user to ensure it has permission to read the mounted ~/.aws directory
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    volumes:
      # Mount your local AWS configuration and SSO cache into the container
      - ~/.aws:/home/spring/.aws:ro
    environment:
      # Replace 'fh-wedel-msa' with your actual AWS SSO profile name if different
      - AWS_PROFILE=${AWS_PROFILE:-fh-wedel-msa}
      - SPRING_CLOUD_AWS_REGION_STATIC=eu-north-1
  web-ui-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/web-ui:latest
    build:
      context: web-ui
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./web-ui:/app
  workflow-service:
    image: 395982336633.dkr.ecr.eu-north-1.amazonaws.com/fh-wedel/workflow:latest
    build:
      context: workflow-service
    ports:
      - "8081:8080"
