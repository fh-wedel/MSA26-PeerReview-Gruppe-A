spring.application.name=user-service
spring.main.banner-mode=off
management.endpoint.health.probes.enabled=true
server.port=${SERVER_PORT:8080}

# AWS Configuration
spring.cloud.aws.region.static=${AWS_REGION:eu-north-1}

# AWS Cognito
aws.cognito.user-pool-id=${COGNITO_USER_POOL_ID:}

# Caffeine Cache configuration
# user-by-sub / user-by-username: 5 min TTL, max 1000 entries
# group-members: 5 min TTL, max 50 entries
# search: 2 min TTL, max 200 entries
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=300s

# AWS SQS
spring.cloud.aws.sqs.dualstack-enabled=true
aws.sqs.request.queue-name=${SQS_REQUEST_QUEUE:}
