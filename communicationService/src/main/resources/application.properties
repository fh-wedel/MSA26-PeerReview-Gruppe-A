spring.application.name=communication
spring.main.banner-mode=off
management.endpoint.health.probes.enabled=true
server.port=${SERVER_PORT:8080}
spring.cloud.aws.region.static=${AWS_REGION}
aws.dynamodb.table-name=${DYNAMODB_TABLE_NAME:communication-service}
aws.cognito.user-pool-id=${COGNITO_USER_POOL_ID:}
api.base-url=${API_BASE_URL:http://localhost:8080}
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
