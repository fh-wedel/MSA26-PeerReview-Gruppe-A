server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Rewrite /prod paths for local development (matches /prod, /prod/, and /prod/assets/...)
    location /prod {
        rewrite ^/prod/?(.*)$ /$1 last;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
