spring.application.name=matching
spring.main.banner-mode=off
management.endpoint.health.probes.enabled=true
server.port=${SERVER_PORT:8080}

# AWS SQS Configuration
spring.cloud.aws.sqs.dualstack-enabled=true
aws.sqs.request.queue-name=${SQS_REQUEST_QUEUE:}
aws.sqs.response.queue-name=${SQS_RESPONSE_QUEUE:}
spring.cloud.aws.region.static=${AWS_REGION:eu-north-1}

# AWS Cognito Configuration
aws.cognito.user-pool-id=${COGNITO_USER_POOL_ID:}
aws.cognito.reviewer-group-name=${COGNITO_REVIEWER_GROUP_NAME:Reviewer}

# DynamoDB Configuration
aws.dynamodb.table-name=${DYNAMODB_TABLE_NAME:matching-service-matches}
